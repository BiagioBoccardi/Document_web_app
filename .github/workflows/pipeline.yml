name: Java Backend CI Multi-Service

on:
  push:
    branches:
      - main
      - Notification_service
      - Search_service
      - Document_Service
      - User_Service 
  pull_request:
    branches: 
      - main
      
jobs:
  # Job 1: Compilazione e Build Docker Backend
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Creazione cartella secrets e file dummy per evitare errori nel build Docker
      - name: Setup Dummy Secrets for Build
        run: |
          mkdir -p secrets
          echo "admin" > secrets/influxdb2-admin-username
          echo "password123" > secrets/influxdb2-admin-password
          echo "token123" > secrets/influxdb2-admin-token

      - name: Run Tests
        working-directory: ./Document-web-app-be
        run: mvn clean verify

      - name: Publish Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: Document-web-app-be/target/surefire-reports/*.xml
          retention-days: 7

      - name: Build Docker Images (Verify Dockerfiles)
        working-directory: .
        run: |
          docker build -t user-service:latest -f ./Document-web-app-be/Dockerfile ./Document-web-app-be
          docker build -t document-service:latest -f ./Document-web-app-be/Dockerfile ./Document-web-app-be
          # Se hai Dockerfile specifici o argomenti diversi, aggiungili qui

  # Job 2: Build del Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Document-web-app-fe/package-lock.json'

      - name: Install and Build Frontend
        working-directory: ./Document-web-app-fe
        run: |
          npm install
          npm run lint
          npm run build

      - name: Build Frontend Docker Image
        working-directory: ./Document-web-app-fe
        run: docker build -t document-frontend:latest .