version: '3.8'

services:
  # Database Relazionale (User Service / Core)
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}         # Bisogna creare un file .env dove inserire il vostro utente e la vostra password del db.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: document_web_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Database NoSQL (Content Service)
  # mongo-db:
  #   image: mongo:latest
  #   container_name: mongo_db
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: admin
  #     MONGO_INITDB_ROOT_PASSWORD: password
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo_data:/data/db

  # Message Broker (Comunicazione Asincrona)
  # rabbitmq:
  #   image: rabbitmq:3-management
  #   container_name: rabbitmq_broker
  #   ports:
  #     - "5672:5672"   # Porta per il protocollo AMQP
  #     - "15672:15672" # Interfaccia Web di Management (User/Pass: guest/guest)
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq

  # Vector Database (IA / Ricerca Semantica)
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: qdrant_db
  #   ports:
  #     - "6333:6333" # API HTTP
  #     - "6334:6334" # gRPC
  #   volumes:
  #     - qdrant_data:/qdrant/storage

  # Placeholder per il tuo Microservizio Java (Backend)
  # Una volta creato il Dockerfile nel tuo progetto Java, decommenta questa parte
  app-backend:
    build: 
      context: ./Document-web-app-be 
      dockerfile: Dockerfile
    container_name: java_backend
    ports:
      - "8080:81"
      - "8080:82"
      - "8080:83"
      - "8080:84"
    depends_on:
      - postgres-db
      - mongo-db
      - rabbitmq
    environment:
      DB_URL: jdbc:postgresql://postgres-db:5432/document_web_app
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}


  # Placeholder per il Frontend React
  # frontend:
  #   build: ./path-to-your-react-app
  #   container_name: react_frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - app-backend

volumes:
  postgres_data:
  mongo_data:
  rabbitmq_data:
  qdrant_data: