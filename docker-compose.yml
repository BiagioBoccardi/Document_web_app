
services:
  # Database Relazionale (User Service / Core)
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}         # Bisogna creare un file .env dove inserire il vostro utente e la vostra password del db.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: document_web_app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d document_web_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Message Broker (Comunicazione Asincrona)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Porta per il protocollo AMQP
      - "15672:15672" # Interfaccia Web di Management (User/Pass: guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database NoSQL (Content Service)
  mongo-db:
    image: mongo:latest
    container_name: mongo_db
    command: mongod --quiet # Riduce drasticamente i log informativi
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "-u", "admin", "-p", "password", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Vector Database (IA / Ricerca Semantica)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333" # API HTTP
      - "6334:6334" # gRPC
    
  user-service:
    build: 
      context: ./Document-web-app-be
    container_name: user_service
    environment:
      - SERVICE_TYPE=USER_SERVICE
      - DB_HOST=postgres-db
      - RABBITMQ_HOST=rabbitmq
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=una-chiave-molto-lunga-e-casuale-123!
      # --- Configurazione InfluxDB ---
      - INFLUXDB_URL=http://influxdb2:8086
      - INFLUXDB_ORG=docs
      - INFLUXDB_BUCKET=home
      - INFLUXDB_TOKEN_FILE=/run/secrets/influxdb2-admin-token
    secrets:
      - influxdb2-admin-token
    ports:
      - "8081:8080" # Mappa la porta 8080 interna sulla 8081 esterna
    depends_on:
      postgres-db:
        condition: service_healthy
      influxdb2:
        condition: service_started


  document-service:
    build: 
      context: ./Document-web-app-be
    container_name: document_service
    environment:
      - SERVICE_TYPE=DOCUMENT_SERVICE
      - MONGO_URI=mongodb://admin:password@mongo-db:27017/document_web_app?authSource=admin # MongoDB da docker - Usa le credenziali di mongo-db
      - MONGO_DB=document_web_app
      - JWT_SECRET=una-chiave-molto-lunga-e-casuale-123!
    ports:
      - "8082:8080"
    depends_on:
      mongo-db:
        condition: service_healthy

  search-service:
    build: 
      context: ./Document-web-app-be
    container_name: search_service
    environment:
      SERVICE_TYPE: "SEARCH_SERVICE"
      QDRANT_URL: "http://qdrant:6333" # URL per connettersi al Vector DB
    ports:
      - "8083:8080"
    depends_on:
      - qdrant

  notification-service:
    build: 
      context: ./Document-web-app-be
    container_name: notification_service
    environment:
      - SERVICE_TYPE=NOTIFICATION_SERVICE
      - RABBITMQ_HOST=rabbitmq
      - DB_HOST=postgres-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # --- Configurazione InfluxDB ---
      - INFLUXDB_URL=http://influxdb2:8086
      - INFLUXDB_ORG=docs
      - INFLUXDB_BUCKET=home
      - INFLUXDB_TOKEN_FILE=/run/secrets/influxdb2-admin-token
    secrets:
      - influxdb2-admin-token
    ports:
      - "8084:8080"
    depends_on:
      postgres-db: 
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      influxdb2:
        condition: service_started

    # --- API GATEWAY (NGINX) ---
  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - document-service
      - search-service
      - notification-service

  # --- FRONTEND ---
  frontend:
    build: ./Document-web-app-fe
    container_name: react_frontend
    ports:
      - "5173:80"   # Mappiamo la 80 di Nginx sulla 5173 locale
    depends_on:
      - gateway

  # --- INFLUXDB 2.0 (Time-Series Database) ---
  influxdb2:
    image: influxdb:2.7
    ports:
      - 8086:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME_FILE: /run/secrets/influxdb2-admin-username
      DOCKER_INFLUXDB_INIT_PASSWORD_FILE: /run/secrets/influxdb2-admin-password
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE: /run/secrets/influxdb2-admin-token
      DOCKER_INFLUXDB_INIT_ORG: docs
      DOCKER_INFLUXDB_INIT_BUCKET: home
    secrets:
      - influxdb2-admin-username
      - influxdb2-admin-password
      - influxdb2-admin-token
    volumes:
      - type: volume
        source: influxdb2-data
        target: /var/lib/influxdb2
      - type: volume
        source: influxdb2-config
        target: /etc/influxdb2
secrets:
  influxdb2-admin-username:
    file: ./secrets/influxdb2-admin-username
  influxdb2-admin-password:
    file: ./secrets/influxdb2-admin-password
  influxdb2-admin-token:
    file: ./secrets/influxdb2-admin-token
volumes:
  influxdb2-data:
  influxdb2-config: